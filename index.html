<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steps Shoes - Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-brown: #6b493d; /* اللون البني من اللوجو */
            --dark-black: #1e1412;    /* اللون الأسود من اللوجو */
            --bg-cream: #e9e2d8;      /* لون الخلفية الكريمي */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-cream);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تأثيرات الخلفية المتحركة */
        .bg-elements {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
        }

        .blob-1 { width: 300px; height: 300px; background: var(--primary-brown); top: -50px; left: -50px; animation: float 10s infinite alternate; }
        .blob-2 { width: 250px; height: 250px; background: var(--dark-black); bottom: -50px; right: -50px; animation: float 12s infinite alternate-reverse; }

        @keyframes float {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(40px, 30px) rotate(15deg); }
        }

        /* الكارت الرئيسي (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 45px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(30, 20, 18, 0.1);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* منطقة اللوجو */
        .logo-box {
            margin-bottom: 35px;
        }

        .main-logo {
            width: 140px; /* مقاس اللوجو */
            height: auto;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        /* تنسيق الأزرار */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* تخصيص ألوان الأزرار بناءً على الهوية الجديدة */
        .btn-wa { background: #25d366; color: white; }
        .btn-fb { background: var(--dark-black); color: var(--bg-cream); }
        .btn-ig { background: transparent; color: var(--dark-black); border: 1.5px solid var(--primary-brown); }
        .btn-tk { background: var(--primary-brown); color: white; }

        .btn-icon { width: 24px; height: 24px; display: flex; align-items: center; }
        .btn-text { flex: 1; text-align: left; }
        .btn-arrow { font-size: 18px; opacity: 0.4; transition: 0.3s; }
        .btn:hover .btn-arrow { opacity: 1; transform: translateX(5px); }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: var(--primary-brown);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 35px 20px; }
            .main-logo { width: 110px; }
        }
    </style>
</head>
<body>

    </div>

        </nav>

    </div>

</body>
</html>
