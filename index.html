<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box
  }

  .page {
    min-height: 100vh;
    /* دي أهم تعديل: vh بتخلي الطول ياخد 100% من طول الشاشة المتاحة */
    background: #e9e2d8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  .page::before {
    content: '';
    position: absolute;
    top: -80px;
    left: -80px;
    width: 300px;
    height: 300px;
    background: rgba(107, 73, 61, 0.08);
    border-radius: 50%
  }

  .page::after {
    content: '';
    position: absolute;
    bottom: -60px;
    right: -60px;
    width: 250px;
    height: 250px;
    background: rgba(30, 20, 18, 0.05);
    border-radius: 50%
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(107, 73, 61, 0.18) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(55px);
    pointer-events: none
  }

  .blob-1 {
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(107, 73, 61, 0.13), transparent 70%);
    top: -80px;
    left: -80px;
    animation: drift1 13s ease-in-out infinite
  }

  .blob-2 {
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(30, 20, 18, 0.07), transparent 70%);
    bottom: -60px;
    right: -60px;
    animation: drift2 11s ease-in-out infinite
  }

  @keyframes drift1 {

    0%,
    100% {
      transform: translate(0, 0)
    }

    50% {
      transform: translate(30px, 20px)
    }
  }

  @keyframes drift2 {

    0%,
    100% {
      transform: translate(0, 0)
    }

    50% {
      transform: translate(-20px, -15px)
    }
  }

  .card {
    background: rgba(255, 255, 255, 0.84);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(107, 73, 61, 0.13);
    border-radius: 26px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    position: relative;
    z-index: 1;
    animation: cardIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both
  }

  @keyframes cardIn {
    from {
      opacity: 0;
      transform: translateY(24px) scale(0.97)
    }

    to {
      opacity: 1;
      transform: none
    }
  }

  .logo-svg {
    width: 115px;
    height: auto;
    filter: drop-shadow(0 2px 10px rgba(107, 73, 61, 0.14))
  }

  .divider {
    width: 34px;
    height: 2.7px;
    background: linear-gradient(90deg, transparent, #6b493d, transparent);
    margin: 20px auto 26px;
    border-radius: 2px
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 11px
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 14px 18px;
    border-radius: 15px;
    text-decoration: none;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    border: 1.5px solid transparent;
    position: relative;
    overflow: hidden;
    transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.2) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.45s ease
  }

  .btn:hover::after {
    transform: translateX(100%)
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 22px rgba(30, 20, 18, 0.14)
  }

  .btn:active {
    transform: scale(0.97)
  }

  .wa {
    background: #25d366;
    border-color: #25d366;
    color: #fff
  }

  .wa:hover {
    background: #20c05a
  }

  .fb {
    background: #1e1412;
    border-color: #1e1412;
    color: #e9e2d8
  }

  .ig {
    background: transparent;
    border-color: rgba(107, 73, 61, 0.38);
    color: #1e1412
  }

  .ig:hover {
    background: rgba(107, 73, 61, 0.06);
    border-color: #6b493d
  }

  .tk {
    background: #6b493d;
    border-color: #6b493d;
    color: #e9e2d8
  }

  .tk:hover {
    background: #7a5446
  }

  .btn-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center
  }

  .btn-icon svg {
    width: 20px;
    height: 20px
  }

  .btn-label {
    flex: 1;
    text-align: left
  }

  .btn-arrow {
    opacity: 0.45;
    font-size: 15px;
    transition: transform 0.2s ease, opacity 0.2s
  }

  .btn:hover .btn-arrow {
    transform: translateX(4px);
    opacity: 0.85
  }

  .wa-badge {
    font-size: 10px;
    background: rgba(255, 255, 255, 0.25);
    padding: 2px 7px;
    border-radius: 20px;
    color: #fff;
    margin-right: 2px
  }

  .footer {
    margin-top: 22px;
    font-size: 11px;
    color: rgba(107, 73, 61, 0.5);
    letter-spacing: 1.8px;
    text-transform: uppercase
  }

  .btn:nth-child(1) {
    animation: slideIn 0.45s ease 0.4s both
  }

  .btn:nth-child(2) {
    animation: slideIn 0.45s ease 0.52s both
  }

  .btn:nth-child(3) {
    animation: slideIn 0.45s ease 0.64s both
  }

  .btn:nth-child(4) {
    animation: slideIn 0.45s ease 0.76s both
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateX(-12px)
    }

    to {
      opacity: 1;
      transform: none
    }
  }
</style>
